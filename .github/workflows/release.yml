# Issue a revision as a controlled artifact.
#
# Tagging `v<revision>` builds the PDF and the HTML, publishes both as workflow
# artifacts, and attaches them to a release. A release asset is immutable once
# published, which is the property a controlled document needs and which the
# Read the Docs PDF does not have -- RTD rebuilds a version in place, so its PDF
# can change after someone has been pointed at it.
#
# Both files are also uploaded as workflow artifacts before anything touches the
# forge's release API. That ordering is deliberate: on a runner with no release
# API to talk to -- a local `act` run, or a build server that only keeps
# artifacts -- the documents are still produced and still retrievable.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Lifted to the job so the attach step below can test it: `secrets` is not
    # one of the contexts a step-level `if` can read, but `env` is.
    env:
      RELEASE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"

      - run: uv sync --group docs

      # The one place the published filenames are decided; see docs.yml.
      - name: Read the document name
        id: doc
        run: uv run python -m spiri_docs fields >> "$GITHUB_OUTPUT"

      # A tag is how a revision gets issued, so refuse to issue one that
      # revisions.yaml still calls a draft. Everything below this line assumes
      # the document is finished.
      - name: Refuse to release a draft
        if: ${{ steps.doc.outputs.draft == 'true' }}
        run: |
          echo "::error::revisions.yaml marks revision ${{ steps.doc.outputs.revision }} as a draft."
          echo 'Remove `draft: true` before tagging, or delete the tag.'
          exit 1

      # texlive-latex-extra carries the packages Sphinx's LaTeX output expects
      # (framed, titlesec, wrapfig, capt-of); latexmk drives the build.
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended tex-gyre \
            librsvg2-bin
          # librsvg2-bin converts the cover logo from SVG, which pdflatex cannot
          # read. The builds below run with -W, so a missing converter fails the
          # release rather than quietly issuing an unbranded controlled document.

      # spiri_docs names the .tex (and so the .pdf) after the document number and
      # revision, so the asset identifies itself once downloaded.
      - name: Build the documents
        run: |
          mkdir -p dist
          uv run sphinx-build -b html -W docs docs/_build/html
          uv run sphinx-build -b latex -W docs docs/_build/latex
          make -C docs/_build/latex all-pdf
          cp docs/_build/latex/${{ steps.doc.outputs.name }}.pdf dist/
          uv run python -c "
          import shutil
          shutil.make_archive('dist/${{ steps.doc.outputs.name }}_html', 'zip', 'docs/_build/html')
          "

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.doc.outputs.name }}_pdf
          path: dist/${{ steps.doc.outputs.name }}.pdf
          if-no-files-found: error

      - name: Upload HTML
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.doc.outputs.name }}_html
          path: dist/${{ steps.doc.outputs.name }}_html.zip
          if-no-files-found: error

      # Skipped when there is no forge to publish to, which is what a local
      # `act` run looks like: no token is injected, so the step stands down and
      # the run still succeeds with both documents uploaded above. Testing the
      # token rather than `env.ACT` is deliberate -- Gitea's runner is act, and
      # it sets ACT too, so keying on that would silently stop releasing on the
      # very server this is meant to run on.
      - name: Attach to the release
        if: ${{ env.RELEASE_TOKEN != '' }}
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/${{ steps.doc.outputs.name }}.pdf
            dist/${{ steps.doc.outputs.name }}_html.zip
          generate_release_notes: true
