# Prose linting against the Spiri style guide.
#
# The rules themselves live in their own repository so the head of documents can
# change them without anyone reopening a manual repo. `vale sync` fetches them.
#
# Until spiri-vale-styles exists, this falls back to the Microsoft style, which
# is a reasonable default for technical documentation. Replace the Packages line
# when the house guide is ready:
#
#   Packages = https://github.com/spiri-robotics/spiri-vale-styles/releases/latest/download/spiri.zip

StylesPath = styles
MinAlertLevel = suggestion

Packages = Microsoft

Vocab = Spiri

[*.md]
BasedOnStyles = Vale, Microsoft

# `{{ revision }}` and friends are substitutions filled in at build time, not
# prose. Without this the spell checker reports every one of them as a
# misspelling, and a contributor learns to ignore the style checker on day one.
TokenIgnores = (\{\{[^}]*\}\})

# Note: the text *inside* a `:::{warning}` block is deliberately still checked.
# Safety notices are the prose most worth getting right.

# Product names and units of measure that are not English words.
Vale.Terms = NO

# Heading capitalisation is a house-style decision, and the default here
# (sentence case) flags legitimate product names in titles. Left off until the
# style guide settles it.
Microsoft.Headings = NO

# Manuals legitimately use the imperative and the occasional long sentence in a
# procedure. Start advisory; tighten once the style guide is agreed.
Microsoft.Contractions = NO
Microsoft.Passive = suggestion
Microsoft.ComplexWords = suggestion
